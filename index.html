<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prithvi | THE Digital Voyager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-white min-h-screen">
    <header class="p-8 text-center flex flex-col items-center">
        <div class="relative inline-block px-12 py-6 rounded-sm shadow-2xl border-b-4 border-amber-900" 
             style="background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); background-color: #3d2b1f;">
            
            <div class="absolute inset-0 bg-black/20 rounded-sm"></div>

            <div class="relative z-10">
                <h1 class="header-font text-5xl mb-1 text-amber-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">
                    Prithvi
                </h1>
                <p class="header-font text-xl text-amber-200 tracking-widest uppercase">
                    -- The Digital Voyager --
                </p>
            </div>
        </div>
        <div class="flex justify-center gap-2 max-w-md mx-auto mt-8 w-full header-font">
            <input type="text" id="searchInput" placeholder="Search country..." class="w-full px-4 py-2 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-amber-500">
            <button onclick="searchCountry()" class="bg-amber-500 hover:bg-amber-600 px-6 py-2 rounded-lg font-bold transition">Search</button>
        </div>
    </header>

    <main id="mainContent" class="container mx-auto px-4 pb-12 max-w-2xl animate-fadeIn">
        <h2 id="viewTitle" class="text-2xl font-semibold mb-8 text-center text-amber-500">Select Any Continent</h2>
        <div id="continentGrid" class="flex flex-col gap-4 perspective max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar"></div>
        <div id="countryList" class="hidden flex flex-col gap-3 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar header-font"></div>
        <div id="detailView" class="hidden max-w-4xl mx-auto bg-slate-800 rounded-2xl overflow-hidden shadow-2xl border border-slate-700 header-font"></div>
    </main>

    <div id="loader" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-amber-500"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
